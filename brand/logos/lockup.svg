<?xml version="1.0" encoding="UTF-8"?>
<!--
  BoothFunnel · Lockup
  Seal + wordmark together. The most formal expression of the brand.
  Use for: homepage hero, deck covers, signage, hardware nameplates, legal docs.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 200" role="img" aria-label="Boothfunnel lockup">
  <title>Boothfunnel lockup — seal and wordmark</title>
  <!-- Seal -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#1A1612" stroke-width="2"/>
  <text x="100" y="130"
        font-family="'GT Sectra', 'Editorial New', Georgia, serif"
        font-style="italic"
        font-size="92"
        font-weight="400"
        fill="#1A1612"
        text-anchor="middle">bf</text>
  <!-- Hairline separator -->
  <line x1="220" y1="40" x2="220" y2="160" stroke="#C9A063" stroke-width="1.5"/>
  <!-- Wordmark -->
  <text x="260" y="135"
        font-family="Söhne, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="110"
        font-weight="500"
        letter-spacing="-2"
        fill="#1A1612">Booth</text>
  <text x="540" y="135"
        font-family="'GT Sectra', 'Editorial New', Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-size="110"
        font-weight="400"
        letter-spacing="-1"
        fill="#B33A2A">funnel</text>
</svg>
