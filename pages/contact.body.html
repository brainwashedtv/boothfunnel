<section class="bf-hero">
  <div class="bf-wrap" style="max-width: 760px; text-align: center;">
    <span class="bf-eyebrow">Contact</span>
    <h1 class="bf-h1">Talk to a human.</h1>
    <p class="bf-lead" style="margin-left: auto; margin-right: auto;">Pricing questions, multi-location rollouts, custom branding — drop a message and someone from the team will be back within one business day.</p>
  </div>
</section>

<section class="bf-section-tight">
  <div class="bf-wrap" style="max-width: 600px;">
    <form class="bf-form" id="bf-contact-form" method="post" action="/api/contact">
      <div class="bf-grid-2">
        <div class="bf-field">
          <label class="bf-label" for="contact-name">Your name</label>
          <input class="bf-input" id="contact-name" name="name" type="text" required />
        </div>
        <div class="bf-field">
          <label class="bf-label" for="contact-email">Work email</label>
          <input class="bf-input" id="contact-email" name="email" type="email" required />
        </div>
      </div>
      <div class="bf-field">
        <label class="bf-label" for="contact-venue">Venue or company</label>
        <input class="bf-input" id="contact-venue" name="venue" type="text" />
      </div>
      <div class="bf-field">
        <label class="bf-label" for="contact-topic">What can we help with?</label>
        <select class="bf-select" id="contact-topic" name="topic">
          <option value="pricing">Pricing &amp; plans</option>
          <option value="group">Group rollout (5–49 booths)</option>
          <option value="bulk">Bulk order (50+ booths)</option>
          <option value="multi">Multi-location rollout</option>
          <option value="custom">Custom branding</option>
          <option value="press">Press / partnerships</option>
          <option value="support">Existing customer support</option>
          <option value="other">Something else</option>
        </select>
      </div>
      <div class="bf-field">
        <label class="bf-label" for="contact-message">Message</label>
        <textarea class="bf-textarea" id="contact-message" name="message" required></textarea>
      </div>
      <button class="bf-btn bf-btn-primary bf-btn-lg" type="submit">Send message</button>
      <p class="bf-help" id="bf-contact-status" style="margin-top: 10px; min-height: 18px;"></p>
    </form>
  </div>
</section>

<script>
(function(){
  var form = document.getElementById('bf-contact-form');
  var status = document.getElementById('bf-contact-status');
  if (!form) return;
  form.addEventListener('submit', function(e){
    e.preventDefault();
    status.textContent = 'Sending...';
    var data = Object.fromEntries(new FormData(form).entries());
    fetch('/api/contact', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data)
    }).then(function(r){
      if (r.ok) {
        status.style.color = 'var(--bf-success)';
        status.textContent = 'Got it — we’ll be in touch within one business day.';
        form.reset();
      } else {
        throw new Error('bad response');
      }
    }).catch(function(){
      status.style.color = 'var(--bf-danger)';
      status.textContent = 'Something went wrong. Email hello@boothfunnel.com instead.';
    });
  });
})();
</script>
